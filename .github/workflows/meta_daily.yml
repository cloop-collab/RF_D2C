name: Meta to BigQuery Daily

on:
  schedule:
    # 깃허브 스케줄은 지연/누락이 잦아 여러 시각으로 중복 실행(멱등이라 안전).
    - cron: "30 23 * * *"   # 08:30 KST (= 23:30 UTC)
    - cron: "30 1 * * *"    # 10:30 KST (= 01:30 UTC)
    - cron: "30 3 * * *"    # 12:30 KST (= 03:30 UTC)
  workflow_dispatch:
    inputs:
      backfill_months:
        description: "과거 N개월 1회 백필 (예: 37). 비워두면 일상 모드(최근 7일)."
        required: false
        default: ""

jobs:
  load:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 라이브러리 설치
        run: pip install -r requirements.txt
      - name: 서비스계정 키 파일 만들기 (시크릿에서)
        run: |
          cat > sa_key.json <<'KEY'
          ${{ secrets.GCP_SA_KEY }}
          KEY
      - name: 적재 실행
        env:
          GOOGLE_APPLICATION_CREDENTIALS: sa_key.json
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          AD_ACCOUNT_IDS: ${{ secrets.AD_ACCOUNT_IDS }}
          BQ_PROJECT: rf-ads-db-500505
          BQ_DATASET: meta_ads
          BQ_TABLE: rf_meta_ads
          LOOKBACK_DAYS: "7"
          BACKFILL_MONTHS: ${{ github.event.inputs.backfill_months }}
        run: python meta_to_bigquery.py
      - name: 키 파일 삭제
        if: always()
        run: rm -f sa_key.json
