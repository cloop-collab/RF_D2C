name: Meta to BigQuery Daily

on:
  schedule:
    # 한국시간(KST) 오전 7시 = UTC 22:00 (KST = UTC+9). 깃허브 cron은 UTC 기준.
    - cron: "17 22 * * *"    # 07:17 KST
    - cron: "42 22 * * *"    # 07:42 KST (누락 대비)
    - cron: "17 0 * * *"     # 09:17 KST (누락 대비 재시도)
  workflow_dispatch:
    inputs:
      backfill_months:
        description: "과거 N개월 1회 백필 (예: 37). 비워두면 일상 모드(최근 7일)."
        required: false
        default: ""
      attr_windows:
        description: "어트리뷰션 윈도우(콤마). 예: 1d_click,7d_click,1d_view,1d_ev. 비우면 기본만."
        required: false
        default: ""
      target_table:
        description: "적재 대상 테이블(검증용 임시표 지정 가능). 비우면 rf_meta_ads."
        required: false
        default: ""
      lookback_days:
        description: "일상 모드에서 최근 며칠. 비우면 7."
        required: false
        default: ""

jobs:
  load:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 라이브러리 설치
        run: pip install -r requirements.txt
      - name: 서비스계정 키 파일 만들기 (시크릿에서)
        run: |
          cat > sa_key.json <<'KEY'
          ${{ secrets.GCP_SA_KEY }}
          KEY
      - name: 적재 실행
        env:
          GOOGLE_APPLICATION_CREDENTIALS: sa_key.json
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          AD_ACCOUNT_IDS: ${{ secrets.AD_ACCOUNT_IDS }}
          BQ_PROJECT: rf-ads-db-500505
          BQ_DATASET: meta_ads
          BQ_TABLE: ${{ github.event.inputs.target_table || 'rf_meta_ads' }}
          LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '7' }}
          BACKFILL_MONTHS: ${{ github.event.inputs.backfill_months }}
          # 스케줄/수동 모두 어트리뷰션 윈도우 포함 수집(입력이 있으면 우선). value(계정 기본)는 불변.
          META_ATTR_WINDOWS: ${{ github.event.inputs.attr_windows || '1d_click,7d_click,1d_view,1d_ev' }}
        run: python meta_to_bigquery.py
      - name: 메타 평탄화 뷰 갱신 (meta/sql/*.sql)
        env:
          GOOGLE_APPLICATION_CREDENTIALS: sa_key.json
          BQ_PROJECT: rf-ads-db-500505
          BQ_LOCATION: asia-northeast3
        run: python meta/refresh_meta_views.py
      - name: 키 파일 삭제
        if: always()
        run: rm -f sa_key.json
