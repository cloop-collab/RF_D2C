name: Meta Audit Snapshot (Hourly)

# 최근 8일 성과를 매시간 스냅샷으로 누적 → 보정 추적 / 확정 시점 확인용
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 라이브러리 설치
        run: pip install -r requirements.txt
      - name: 서비스계정 키 파일 만들기
        run: |
          cat > sa_key.json <<'KEY'
          ${{ secrets.GCP_SA_KEY }}
          KEY
      - name: 스냅샷 기록
        env:
          GOOGLE_APPLICATION_CREDENTIALS: sa_key.json
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          AD_ACCOUNT_IDS: ${{ secrets.AD_ACCOUNT_IDS }}
          BQ_PROJECT: rf-ads-db-500505
          BQ_DATASET: meta_ads
        run: python audit_snapshot.py
      - name: 키 파일 삭제
        if: always()
        run: rm -f sa_key.json
