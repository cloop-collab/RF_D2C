name: CRM 발송대상 추출 (온디맨드)

# 개인정보는 BigQuery/코드에 저장하지 않고, 발송리스트 CSV 아티팩트로만 출력(1일 후 자동삭제).
# 회원=고급조건 전부 / 비회원(게스트)=주문 단위 모수(수신동의 미확인 → 발송 전 동의 확보 필요).
# ※ mall(기본 all)·min_spend 등은 필요 시 로컬 실행(crm/README.md) 또는 스크립트 env 로.

on:
  workflow_dispatch:
    inputs:
      product_kw:
        description: "대상상품 상품명 키워드(부분일치). 예: 애사비"
        required: false
        default: ""
      product_no:
        description: "대상상품 상품번호(콤마). 예: 472,401  (키워드와 함께 시 둘 중 하나)"
        required: false
        default: ""
      option_include:
        description: "이 옵션만 포함(옵션값 부분일치). 예: 혼합 12개입"
        required: false
        default: ""
      option_exclude:
        description: "이 옵션 제외(옵션값 부분일치). 예: 단품"
        required: false
        default: ""
      exclude_product_kw:
        description: "이 상품을 산 회원은 제외(상품명 키워드, 회원만). 예: 화이바"
        required: false
        default: ""
      coupon:
        description: "쿠폰: any | used(사용) | notused(미사용)"
        required: false
        default: "any"
      min_orders:
        description: "기간 내 대상상품 최소 주문수(회원, 재구매 타겟). 기본 1"
        required: false
        default: "1"
      days:
        description: "최근 N일 내 구매 (기본 30)"
        required: false
        default: "30"
      include_guest:
        description: "비회원(게스트) 포함: 1=포함 (수신동의 미확인, 모수용)"
        required: false
        default: ""
      channel:
        description: "회원 수신동의 필터: sms | email | all (기본 all)"
        required: false
        default: "all"

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GOOGLE_APPLICATION_CREDENTIALS: sa_key.json
      BQ_PROJECT: rf-ads-db-500505
      BQ_DATASET: cafe24
      BQ_LOCATION: asia-northeast3
      CAFE24_MALL_ID: ${{ secrets.CAFE24_MALL_ID }}
      CAFE24_CLIENT_ID: ${{ secrets.CAFE24_CLIENT_ID }}
      CAFE24_CLIENT_SECRET: ${{ secrets.CAFE24_CLIENT_SECRET }}
      CRM_PRODUCT_KW: ${{ github.event.inputs.product_kw }}
      CRM_PRODUCT_NO: ${{ github.event.inputs.product_no }}
      CRM_OPTION_INCLUDE: ${{ github.event.inputs.option_include }}
      CRM_OPTION_EXCLUDE: ${{ github.event.inputs.option_exclude }}
      CRM_EXCLUDE_PRODUCT_KW: ${{ github.event.inputs.exclude_product_kw }}
      CRM_COUPON: ${{ github.event.inputs.coupon }}
      CRM_MIN_ORDERS: ${{ github.event.inputs.min_orders }}
      CRM_DAYS: ${{ github.event.inputs.days }}
      CRM_INCLUDE_GUEST: ${{ github.event.inputs.include_guest }}
      CRM_CHANNEL: ${{ github.event.inputs.channel }}
      CRM_OUT: send_list.csv
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r cafe24/requirements.txt
      - name: 서비스계정 키 파일
        run: |
          cat > sa_key.json <<'KEY'
          ${{ secrets.GCP_SA_KEY }}
          KEY
      - name: 발송대상 추출
        run: python crm/crm_extract.py
      - if: always()
        run: rm -f sa_key.json
      - name: 발송리스트 업로드(1일 보관)
        uses: actions/upload-artifact@v4
        with:
          name: crm-send-list
          path: send_list.csv
          retention-days: 1
