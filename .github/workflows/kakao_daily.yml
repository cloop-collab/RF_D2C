name: Kakao Moment to BigQuery Daily

on:
  schedule:
    # 하루 4회(KST) — 06/12/18/00시. 정각 혼잡 회피 위해 :07분. (KST=UTC+9)
    - cron: "7 21 * * *"   # 06:07 KST
    - cron: "7 3 * * *"    # 12:07 KST
    - cron: "7 9 * * *"    # 18:07 KST
    - cron: "7 15 * * *"   # 00:07 KST
  workflow_dispatch:
    inputs:
      backfill_days:
        description: "과거 N일 1회 백필 (예: 365=1년). 비워두면 일상 모드(어제)."
        required: false
        default: ""

jobs:
  load:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    defaults:
      run:
        working-directory: kakao
    env:
      GOOGLE_APPLICATION_CREDENTIALS: sa_key.json
      BQ_PROJECT: rf-ads-db-500505
      BQ_DATASET: kakao_moment
      BQ_LOCATION: asia-northeast3
      KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
      KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
      KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
      KAKAO_ACCESS_TOKEN: ${{ secrets.KAKAO_ACCESS_TOKEN }}
      KAKAO_AD_ACCOUNT_IDS: ${{ secrets.KAKAO_AD_ACCOUNT_IDS }}
      BACKFILL_DAYS: ${{ github.event.inputs.backfill_days }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: 서비스 계정 키 파일 생성
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: printf '%s' "$GCP_SA_KEY" > sa_key.json
      - name: 파이프라인 실행
        run: |
          if [ -n "${{ github.event.inputs.backfill_days }}" ]; then
            python kakao_to_bigquery.py backfill
          else
            python kakao_to_bigquery.py daily
          fi
