name: Naver SA to BigQuery Daily

on:
  schedule:
    - cron: "17 21 * * *"    # 06:17 KST
    - cron: "42 21 * * *"    # 06:42 KST (누락 대비)
    - cron: "17 23 * * *"    # 08:17 KST (누락 대비 재시도)
  workflow_dispatch:
    inputs:
      backfill_days:
        description: "과거 N일 1회 백필 (예: 365=1년). 비워두면 일상 모드(최근 7일)."
        required: false
        default: ""

jobs:
  load:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    env:
      GOOGLE_APPLICATION_CREDENTIALS: sa_key.json
      NAVER_CLOOP_LICENSE: ${{ secrets.NAVER_CLOOP_LICENSE }}
      NAVER_CLOOP_SECRET: ${{ secrets.NAVER_CLOOP_SECRET }}
      NAVER_CLOOP_CUSTOMER_ID: ${{ secrets.NAVER_CLOOP_CUSTOMER_ID }}
      NAVER_SPRINT_LICENSE: ${{ secrets.NAVER_SPRINT_LICENSE }}
      NAVER_SPRINT_SECRET: ${{ secrets.NAVER_SPRINT_SECRET }}
      NAVER_SPRINT_CUSTOMER_ID: ${{ secrets.NAVER_SPRINT_CUSTOMER_ID }}
      BQ_PROJECT: rf-ads-db-500505
      BQ_DATASET: naver_ads
      BQ_TABLE: rf_naver_sa_ads
      NAVER_LEVEL: both
      LOOKBACK_DAYS: "7"
      BACKFILL_DAYS: ${{ github.event.inputs.backfill_days }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: 서비스계정 키 파일
        run: |
          cat > sa_key.json <<'KEY'
          ${{ secrets.GCP_SA_KEY }}
          KEY
      - name: 적재 (캠페인+키워드 한 테이블)
        run: python naver/naver_to_bigquery.py
      - if: always()
        run: rm -f sa_key.json
