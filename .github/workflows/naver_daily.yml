name: Naver SA to BigQuery Daily

on:
  schedule:
    - cron: "0 21 * * *"   # 매일 06:00 KST (= 21:00 UTC)
  workflow_dispatch: {}

jobs:
  load:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 라이브러리 설치
        run: pip install -r requirements.txt
      - name: 서비스계정 키 파일 만들기 (시크릿에서)
        run: |
          cat > sa_key.json <<'KEY'
          ${{ secrets.GCP_SA_KEY }}
          KEY
      - name: 적재 실행 (최근 7일)
        env:
          GOOGLE_APPLICATION_CREDENTIALS: sa_key.json
          NAVER_KLUP_LICENSE: ${{ secrets.NAVER_KLUP_LICENSE }}
          NAVER_KLUP_SECRET: ${{ secrets.NAVER_KLUP_SECRET }}
          NAVER_KLUP_CUSTOMER_ID: ${{ secrets.NAVER_KLUP_CUSTOMER_ID }}
          NAVER_SPRINT_LICENSE: ${{ secrets.NAVER_SPRINT_LICENSE }}
          NAVER_SPRINT_SECRET: ${{ secrets.NAVER_SPRINT_SECRET }}
          NAVER_SPRINT_CUSTOMER_ID: ${{ secrets.NAVER_SPRINT_CUSTOMER_ID }}
          BQ_PROJECT: rf-ads-db-500505
          BQ_DATASET: naver_ads
          BQ_TABLE: rf_naver_sa_ads
          LOOKBACK_DAYS: "7"
        run: python naver/naver_to_bigquery.py
      - name: 키 파일 삭제
        if: always()
        run: rm -f sa_key.json
