name: Meta Hourly-of-day to BigQuery (rf_meta_ads_hourly)

# 시간대(0~23시)별 Meta 광고 지표 → meta_ads.rf_meta_ads_hourly (대시보드 시간대 드릴다운용).
# ⚠ 기존 "Meta to BigQuery Hourly (Today)"(meta_hourly.yml, 당일 일별그레인)와 다름 — 이건 hour-of-day 브레이크다운.
# level=ad, breakdowns=hourly_stats_aggregated_by_advertiser_time_zone. impressions·clicks·spend 슬림.

on:
  schedule:
    - cron: "30 22 * * *"   # 07:30 KST (전일 확정)
    - cron: "30 9 * * *"    # 18:30 KST (당일 시간대 갱신)
  workflow_dispatch:
    inputs:
      since:
        description: "백필 시작일 YYYY-MM-DD (until과 함께). 비우면 일상(최근 N일)."
        required: false
        default: ""
      until:
        description: "백필 종료일 YYYY-MM-DD (since와 함께)."
        required: false
        default: ""
      lookback_days:
        description: "일상 모드 최근 며칠. 비우면 3."
        required: false
        default: ""

jobs:
  load:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: 서비스계정 키 파일
        run: |
          cat > sa_key.json <<'KEY'
          ${{ secrets.GCP_SA_KEY }}
          KEY
      - name: 적재 (시간대별 → rf_meta_ads_hourly)
        env:
          GOOGLE_APPLICATION_CREDENTIALS: sa_key.json
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          AD_ACCOUNT_IDS: ${{ secrets.AD_ACCOUNT_IDS }}
          BQ_PROJECT: rf-ads-db-500505
          BQ_DATASET: meta_ads
          BQ_TABLE: rf_meta_ads_hourly
          BQ_LOCATION: asia-northeast3
          LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '3' }}
          META_SINCE: ${{ github.event.inputs.since }}
          META_UNTIL: ${{ github.event.inputs.until }}
        run: python meta/meta_hourly_to_bigquery.py
      - if: always()
        run: rm -f sa_key.json
