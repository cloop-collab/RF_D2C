name: GA4 Transactions to BigQuery Hourly (Today)

on:
  schedule:
    - cron: "10 * * * *"   # 매시 10분(UTC) = 시간당 1회, 오늘 거래 갱신
  workflow_dispatch: {}

jobs:
  d0:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BQ_PROJECT: rf-ads-db-500505
      BQ_DATASET: rf_ga4
      BQ_TABLE_TX: rf_ga4_transactions
      BQ_LOCATION: asia-northeast3
      KEEP_DAYS: "730"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r ga4/requirements.txt
      - run: printf '%s' "$GCP_SA_KEY" > /tmp/sa.json
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      - name: Refresh rf_ga4_transactions (오늘)
        run: python ga4/ga4_transactions_to_bigquery.py --mode d0
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
