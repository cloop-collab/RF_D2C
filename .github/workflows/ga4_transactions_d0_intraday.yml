name: GA4 Transactions to BigQuery Hourly (Today)

on:
  # 스케줄 제거: 이 잡은 GitHub 스케줄 스킵으로 4~9시간 간격으로만 발화됨.
  # 당일 거래 갱신은 안정적으로 매시간 도는 ga4_d0_intraday.yml에 통합함. 여기선 수동 백필/일회성만.
  workflow_dispatch: {}

jobs:
  d0:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BQ_PROJECT: rf-ads-db-500505
      BQ_DATASET: rf_ga4
      BQ_TABLE_TX: rf_ga4_transactions
      BQ_LOCATION: asia-northeast3
      KEEP_DAYS: "730"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r ga4/requirements.txt
      - run: printf '%s' "$GCP_SA_KEY" > /tmp/sa.json
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      - name: Refresh rf_ga4_transactions (오늘)
        run: python ga4/ga4_transactions_to_bigquery.py --mode d0
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
