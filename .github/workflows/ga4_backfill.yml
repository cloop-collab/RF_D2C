name: GA4 Backfill (수동 1회 · 최근 1년)

on:
  workflow_dispatch:

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r ga4/requirements.txt
      - run: printf '%s' "$GCP_SA_KEY" > /tmp/sa.json
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      - name: Backfill rf_ga4
        run: python ga4/ga4_to_bigquery.py --mode backfill
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
