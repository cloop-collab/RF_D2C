name: GA4 to BigQuery Hourly (Today)

on:
  schedule:
    - cron: '0 * * * *'    # 매시간 (네이버 d0와 동일한 시간당 갱신)
  workflow_dispatch:

jobs:
  d0:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r ga4/requirements.txt
      - run: printf '%s' "$GCP_SA_KEY" > /tmp/sa.json
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      - name: Refresh rf_ga4_d0 (오늘)
        run: python ga4/ga4_to_bigquery.py --mode d0
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
      # 거래(transactions) 당일 갱신도 여기에 통합: 이 잡(0 * * * *)은 안정적으로 매시간 발화하나,
      # 별도 ga4_transactions_d0 잡은 GitHub 스케줄 스킵으로 4~9시간 간격으로만 돌아 지연됨.
      - name: Refresh rf_ga4_transactions (오늘)
        run: python ga4/ga4_transactions_to_bigquery.py --mode d0
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
