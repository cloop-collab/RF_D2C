name: (임시) Cafe24 구매자정보 프로브
on:
  workflow_dispatch:
concurrency:
  group: cafe24-token
  cancel-in-progress: false
jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GOOGLE_APPLICATION_CREDENTIALS: sa_key.json
      BQ_PROJECT: rf-ads-db-500505
      BQ_DATASET: cafe24
      BQ_LOCATION: asia-northeast3
      CAFE24_MALL_ID: ${{ secrets.CAFE24_MALL_ID }}
      CAFE24_CLIENT_ID: ${{ secrets.CAFE24_CLIENT_ID }}
      CAFE24_CLIENT_SECRET: ${{ secrets.CAFE24_CLIENT_SECRET }}
      CAFE24_REFRESH_TOKEN: ${{ secrets.CAFE24_REFRESH_TOKEN }}
      CAFE24_SHOPS: '[{"shop_no":1,"mall":"cloop"}]'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r cafe24/requirements.txt
      - name: SA key
        run: |
          cat > sa_key.json <<'KEY'
          ${{ secrets.GCP_SA_KEY }}
          KEY
      - name: probe
        run: python cafe24/_probe_buyer.py
      - if: always()
        run: rm -f sa_key.json
