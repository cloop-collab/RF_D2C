name: Naver SA to BigQuery Hourly (Today)

# 당일 데이터를 1시간마다 갱신 (오늘 파티션만 덮어쓰기)
on:
  schedule:
    - cron: "0 * * * *"   # 매시 정각(UTC)
  workflow_dispatch: {}

jobs:
  load:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 라이브러리 설치
        run: pip install -r requirements.txt
      - name: 서비스계정 키 파일 만들기
        run: |
          cat > sa_key.json <<'KEY'
          ${{ secrets.GCP_SA_KEY }}
          KEY
      - name: 당일 적재 (최근 1일)
        env:
          GOOGLE_APPLICATION_CREDENTIALS: sa_key.json
          NAVER_KLUP_LICENSE: ${{ secrets.NAVER_KLUP_LICENSE }}
          NAVER_KLUP_SECRET: ${{ secrets.NAVER_KLUP_SECRET }}
          NAVER_KLUP_CUSTOMER_ID: ${{ secrets.NAVER_KLUP_CUSTOMER_ID }}
          NAVER_SPRINT_LICENSE: ${{ secrets.NAVER_SPRINT_LICENSE }}
          NAVER_SPRINT_SECRET: ${{ secrets.NAVER_SPRINT_SECRET }}
          NAVER_SPRINT_CUSTOMER_ID: ${{ secrets.NAVER_SPRINT_CUSTOMER_ID }}
          BQ_PROJECT: rf-ads-db-500505
          BQ_DATASET: naver_ads
          BQ_TABLE: rf_naver_sa_ads_d0
          LOOKBACK_DAYS: "1"
        run: python naver/naver_to_bigquery.py
      - name: 키 파일 삭제
        if: always()
        run: rm -f sa_key.json
