name: GA4 Items to BigQuery Daily

on:
  schedule:
    - cron: '10 20 * * *'   # 매일 05:10 KST (ga4_daily 5:00 뒤)
  workflow_dispatch:
    inputs:
      backfill_days:
        description: "과거 N일 1회 백필 (예: 365=1년). 비워두면 일상 모드(최근 7일). GA4 데이터 보관기간만큼만 채워짐."
        required: false
        default: ""

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      BQ_PROJECT: rf-ads-db-500505
      BQ_DATASET: rf_ga4
      BQ_TABLE: rf_ga4_items
      BQ_LOCATION: asia-northeast3
      LOOKBACK_DAYS: "7"
      BACKFILL_DAYS: ${{ github.event.inputs.backfill_days }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r ga4/requirements.txt
      - run: printf '%s' "$GCP_SA_KEY" > /tmp/sa.json
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      - name: Load rf_ga4_items (daily / backfill)
        run: python ga4/ga4_items_to_bigquery.py --mode daily
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
